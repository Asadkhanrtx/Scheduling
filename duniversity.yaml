apiVersion: apps/v1
kind: Deployment
metadata:
  name: duniversity-deployment
  namespace: asad-ns
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: duniversity
  template:
    metadata:
      labels:
        app: duniversity
    spec:
      nodeSelector:
        training: devops
      containers:
        - name: duniversity
          image: asadoblivion/duniversity-college-portal:v1.0
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          # env:
          #   - name: MARIADB_ROOT_PASSWORD
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: MARIADB_ROOT_PASSWORD
