          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: DB_USER
          #   - name: DB_PASSWORD
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: DB_PASSWORD
          #   - name: DB_HOST
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: DB_HOST
          #   - name: DB_PORT
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: DB_PORT
          #   - name: GRIEVANCE_DB
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: GRIEVANCE_DB
          #   - name: LEAVE_DB
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: LEAVE_DB
          #   - name: TIMETABLE_DB
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: TIMETABLE_DB
          #   - name: EXAMS_DB
          #     valueFrom:
          #       configMapKeyRef:
          #         name: duniversity-config
          #         key: EXAMS_DB
---

