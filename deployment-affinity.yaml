apiVersion: apps/v1
kind: Deployment
metadata:
  name: duniversity-new
  namespace: asad-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: duniversity-new
  template:
    metadata:
      labels:
        app: duniversity-new
    spec:
      affinity:
        nodeAffinity:

          # 🔴 HARD RULE (UNCHANGED)
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: training
                operator: In
                values:
                - devops
              - key: disktype
                operator: In
                values:
                - ssd
              - key: node-type
                operator: NotIn
                values:
                - spot
              - key: kubernetes.io/os
                operator: In
                values:
                - linux

          # 🟡 SOFT RULE (ADDED ONLY)
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: training
                operator: In
                values:
                - devops

      containers:
      - name: duniversity
        image: asadoblivion/duniversity-college-portal:v1.0
        ports:
        - containerPort: 3000